name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deployment"
        required: true
        type: string

jobs:
  gate:
    name: Security Gate Check
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check spec-validation workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking spec-validation on branch: ${{ github.ref_name }} @ ${{ github.sha }}"
          for i in $(seq 1 24); do
            RESULT=$(gh run list \
              --workflow=spec-validation.yml \
              --branch "${{ github.ref_name }}" \
              --limit 10 \
              --json conclusion,headSha,status)
            CURRENT=$(echo "$RESULT" | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          for r in runs:
              if r['headSha'] == '${{ github.sha }}':
                  print(r['status'] + '|' + (r['conclusion'] or '')); break
          else:
              print('none|none')
            ")
            CURRENT_STATUS=$(echo "$CURRENT" | cut -d'|' -f1)
            CURRENT_CONCLUSION=$(echo "$CURRENT" | cut -d'|' -f2)
            if [ "$CURRENT_STATUS" = "completed" ]; then
              [ "$CURRENT_CONCLUSION" = "success" ] && { echo "PASS: spec-validation succeeded on current commit"; exit 0; }
              echo "BLOCKED: spec-validation concluded '$CURRENT_CONCLUSION' on current commit"; exit 1
            elif [ "$CURRENT_STATUS" = "none" ]; then
              break
            fi
            echo "spec-validation in progress, waiting 10s... ($i/24)"
            sleep 10
          done
          LAST_SUCCESS_SHA=$(echo "$RESULT" | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          for r in runs:
              if r['conclusion'] == 'success':
                  print(r['headSha']); break
          else:
              print('none')
          ")
          if [ "$LAST_SUCCESS_SHA" = "none" ]; then
            echo "BLOCKED: no successful spec-validation run found on branch ${{ github.ref_name }}"
            exit 1
          fi
          CHANGED=$(gh api \
            "repos/${{ github.repository }}/compare/${LAST_SUCCESS_SHA}...${{ github.sha }}" \
            --jq '[.files[].filename | select(startswith(".kiro/specs/") or startswith("mcp-server/") or startswith(".kiro/hooks/"))] | length')
          if [ "$CHANGED" -gt 0 ]; then
            echo "BLOCKED: $CHANGED spec-monitored file(s) changed since last successful run ($LAST_SUCCESS_SHA)"
            exit 1
          fi
          echo "PASS: spec-validation succeeded on $LAST_SUCCESS_SHA; no spec-path changes since then"

      - name: Check plan-security workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking plan-security on branch: ${{ github.ref_name }} @ ${{ github.sha }}"
          for i in $(seq 1 24); do
            RESULT=$(gh run list \
              --workflow=plan-security.yml \
              --branch "${{ github.ref_name }}" \
              --limit 10 \
              --json conclusion,headSha,status)
            CURRENT=$(echo "$RESULT" | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          for r in runs:
              if r['headSha'] == '${{ github.sha }}':
                  print(r['status'] + '|' + (r['conclusion'] or '')); break
          else:
              print('none|none')
            ")
            CURRENT_STATUS=$(echo "$CURRENT" | cut -d'|' -f1)
            CURRENT_CONCLUSION=$(echo "$CURRENT" | cut -d'|' -f2)
            if [ "$CURRENT_STATUS" = "completed" ]; then
              [ "$CURRENT_CONCLUSION" = "success" ] && { echo "PASS: plan-security succeeded on current commit"; exit 0; }
              echo "BLOCKED: plan-security concluded '$CURRENT_CONCLUSION' on current commit"; exit 1
            elif [ "$CURRENT_STATUS" = "none" ]; then
              break
            fi
            echo "plan-security in progress, waiting 10s... ($i/24)"
            sleep 10
          done
          LAST_SUCCESS_SHA=$(echo "$RESULT" | python3 -c "
          import sys, json
          runs = json.load(sys.stdin)
          for r in runs:
              if r['conclusion'] == 'success':
                  print(r['headSha']); break
          else:
              print('none')
          ")
          if [ "$LAST_SUCCESS_SHA" = "none" ]; then
            echo "BLOCKED: no successful plan-security run found on branch ${{ github.ref_name }}"
            exit 1
          fi
          CHANGED=$(gh api \
            "repos/${{ github.repository }}/compare/${LAST_SUCCESS_SHA}...${{ github.sha }}" \
            --jq '[.files[].filename | select(startswith("terraform/") or startswith("policies/opa/"))] | length')
          if [ "$CHANGED" -gt 0 ]; then
            echo "BLOCKED: $CHANGED terraform/OPA file(s) changed since last successful run ($LAST_SUCCESS_SHA) — wait for plan-security to complete"
            exit 1
          fi
          echo "PASS: plan-security succeeded on $LAST_SUCCESS_SHA; no terraform/OPA changes since then"

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [gate]
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan -var-file=environments/prod.tfvars

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply tfplan

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "failure" ]; then
            echo "- **Status:** FAILED — review Terraform output above for rollback instructions" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** SUCCESS" >> $GITHUB_STEP_SUMMARY
          fi
