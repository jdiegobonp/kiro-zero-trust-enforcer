name: Terraform Plan + OPA Security Check

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "policies/opa/**"
      - ".kiro/specs/**"
  pull_request:

jobs:
  opa-policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: OPA syntax check
        run: opa check policies/opa/ --v1-compatible

      - name: OPA — insecure spec must produce violations
        run: |
          RESULT=$(opa eval \
            --data policies/opa/iam_least_privilege.rego \
            --input .kiro/specs/insecure-example.yaml \
            --format pretty \
            "data.iam_least_privilege.deny")
          echo "IAM violations: $RESULT"
          echo "$RESULT" | grep -q "IAM-001" || { echo "FAIL: expected IAM-001 violation"; exit 1; }
          echo "PASS: OPA correctly detected violations in insecure spec"

      - name: OPA — secure spec must pass IAM policy
        run: |
          RESULT=$(opa eval \
            --data policies/opa/iam_least_privilege.rego \
            --input .kiro/specs/secure-example.yaml \
            --format pretty \
            "data.iam_least_privilege.deny")
          echo "Result: $RESULT"
          if echo "$RESULT" | grep -q "IAM-00"; then
            echo "FAIL: secure spec triggered IAM violations"
            exit 1
          fi
          echo "PASS: secure spec passed OPA IAM check"

      - name: OPA — network posture on insecure spec
        run: |
          RESULT=$(opa eval \
            --data policies/opa/no_public_resources.rego \
            --input .kiro/specs/insecure-example.yaml \
            --format pretty \
            "data.no_public_resources.deny")
          echo "Network violations: $RESULT"
          echo "PASS: OPA network check completed"

  iam-access-analyzer:
    name: IAM Access Analyzer — ValidatePolicy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAA_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Validate IAM policies with Access Analyzer
        run: |
          python3 - <<'EOF'
          import boto3, yaml, json, sys, os, glob

          client = boto3.client('accessanalyzer', region_name='us-east-1')

          BLOCKING = {'ERROR', 'SECURITY_WARNING'}
          SEVERITY = {'ERROR': 'CRITICAL', 'SECURITY_WARNING': 'HIGH', 'WARNING': 'MEDIUM', 'SUGGESTION': 'LOW'}

          failed = False
          spec_files = glob.glob('.kiro/specs/*.yaml')
          print(f"Scanning {len(spec_files)} spec(s) with IAM Access Analyzer...")

          for path in spec_files:
              with open(path) as f:
                  spec = yaml.safe_load(f)

              for resource in spec.get('resources', []):
                  if resource['type'] not in ('aws_iam_role', 'aws_iam_policy'):
                      continue
                  statements = resource.get('config', {}).get('statements', [])
                  if not statements:
                      continue

                  policy_doc = json.dumps({
                      'Version': '2012-10-17',
                      'Statement': [
                          {
                              'Effect': s['effect'],
                              'Action': s['actions'],
                              'Resource': s['resources'],
                              **(({'Condition': s['conditions']} if s.get('conditions') else {})),
                          }
                          for s in statements
                      ],
                  })

                  response = client.validate_policy(
                      policyDocument=policy_doc,
                      policyType='IDENTITY_POLICY',
                  )

                  for f in response.get('findings', []):
                      sev = SEVERITY.get(f['findingType'], 'MEDIUM')
                      print(f"  [{sev}] {resource['id']} — {f['issueCode']}: {f['findingDetails']}")
                      if f['findingType'] in BLOCKING:
                          failed = True

          if failed:
              print('\nBLOCKED: IAM Access Analyzer found ERROR or SECURITY_WARNING violations')
              sys.exit(1)
          print('\nPASS: no blocking violations found by IAM Access Analyzer')
          EOF

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Validate minimal-iam module
        working-directory: terraform/modules/minimal-iam
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate secure-rds module
        working-directory: terraform/modules/secure-rds
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate secure-s3 module
        working-directory: terraform/modules/secure-s3
        run: |
          terraform init -backend=false
          terraform validate
